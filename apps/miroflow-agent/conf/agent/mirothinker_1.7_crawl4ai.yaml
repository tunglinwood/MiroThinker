# conf/agent/mirothinker_1.7_crawl4ai.yaml
# MiroThinker 1.7 - Hybrid Setup
# Tools: SearXNG (search), Crawl4AI (scraping), microsandbox (code), qwen3.5 (vision/reasoning)
# Requires: docker run -d -p 11235:11235 --name crawl4ai --shm-size=1g unclecode/crawl4ai:latest
# For fully local setup without API keys, use mirothinker_1.7_microsandbox instead
defaults:
  - default
  - _self_

main_agent:
  tools:
    - tool-searxng-search        # Local SearXNG search (no API key)
    - tool-crawl4ai              # Local Crawl4AI scraping (no API key)
    - microsandbox-docker        # Local Docker code execution (no API key)
    - tool-vqa-os                # Local vision LLM (qwen3.5 at http://localhost:8001/v1)
    - tool-reasoning-os          # Local reasoning model (qwen3.5)
  tool_blacklist:
    []
  max_turns: 200

sub_agents:

# Context management
keep_tool_result: 5
context_compress_limit: 5
retry_with_summary: False
