services:
  # ============================================================
  # Search & Scraping (local, zero API key)
  # ============================================================
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    volumes:
      - ./apps/miroflow-agent/settings.yaml:/etc/searxng/settings.yml:ro
    networks:
      - mirothinker

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "11235:11235"
    shm_size: 1g
    networks:
      - mirothinker

  # ============================================================
  # MiroFlow Agent API
  # ============================================================
  miroflow-api:
    build:
      context: .
      dockerfile: apps/miroflow-agent/Dockerfile
    container_name: miroflow-api
    ports:
      - "8002:8002"
    env_file:
      - apps/miroflow-agent/.env
    volumes:
      - ./apps/miroflow-agent/conf:/workspace/apps/miroflow-agent/conf:ro
      - ./apps/miroflow-agent/logs:/workspace/apps/miroflow-agent/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Override service URLs for Docker internal DNS
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_ENABLED=true
      - CRAWL4AI_BASE_URL=http://crawl4ai:11235
      - CRAWL4AI_ENABLED=true
      # Microsandbox Docker (runs on host)
      - MICROSANDBOX_IMAGE=microsandbox/python:latest
      # Authentication
      - AUTH_ENABLED=true
      - SHARED_ACCESS_PASSWORD=changeme
      - JWT_SECRET=mirothinker-dev-secret-change-in-production
    depends_on:
      - searxng
      - crawl4ai
    networks:
      - mirothinker
    # Allow reaching external LLM on host LAN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ============================================================
  # MiroThinker Web (Next.js)
  # ============================================================
  mirothinker-web:
    build:
      context: ./apps/mirothinker-web
      dockerfile: Dockerfile
    container_name: mirothinker-web
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://miroflow-api:8002
    depends_on:
      - miroflow-api
    networks:
      - mirothinker
    restart: unless-stopped

networks:
  mirothinker:
    driver: bridge
